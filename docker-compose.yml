services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: cs-auditor-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the host-dev DATABASE_URL with the container-absolute path.
      # 4 slashes = absolute path in SQLAlchemy sqlite:/// syntax.
      DATABASE_URL: sqlite:////data/db/complaints.db
    volumes:
      - sqlite_data:/data/db
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: cs-auditor-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Use Docker service DNS so the frontend reaches the backend container,
      # not localhost (which would point back at the frontend container).
      API_BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
